name: PR Quality Gate

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: pr-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m compileall -q .

      - name: Validate JSON and TOML files
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys
          import tomllib

          ignored_dirs = {'.git', '.venv', 'venv', 'node_modules', '__pycache__'}
          # TypeScript tsconfig files commonly use JSONC comments/trailing
          # commas, so do not parse them with Python's strict JSON parser.
          ignored_json_files = {'tsconfig.json', 'tsconfig.app.json', 'tsconfig.node.json'}
          failures = []

          for path in pathlib.Path('.').rglob('*'):
              if any(part in ignored_dirs for part in path.parts):
                  continue
              if not path.is_file():
                  continue
              try:
                  if path.suffix == '.json' and path.name not in ignored_json_files:
                      json.loads(path.read_text(encoding='utf-8'))
                  elif path.suffix == '.toml':
                      tomllib.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append(f'{path}: {exc}')

          if failures:
              print('Configuration syntax validation failed:', file=sys.stderr)
              for failure in failures:
                  print(f'  - {failure}', file=sys.stderr)
              sys.exit(1)

          print('JSON/TOML syntax validation passed')
          PY

      - name: Secret scan on added lines
        if: github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          base = "${{ github.event.pull_request.base.sha }}"
          head = "${{ github.event.pull_request.head.sha }}"
          diff = subprocess.check_output([
              'git', 'diff', f'{base}..{head}', '--',
              ':!*.md', ':!docs/**', ':!uv.lock', ':!package-lock.json', ':!*.lock',
          ], text=True, errors='replace')

          pattern = re.compile(
              r'(api[_-]?key|secret|password|passwd|token)\s*[:=]\s*[\"\'][^\"\']{8,}[\"\']',
              re.IGNORECASE,
          )
          findings = []
          for lineno, line in enumerate(diff.splitlines(), start=1):
              if not line.startswith('+') or line.startswith('+++'):
                  continue
              if pattern.search(line):
                  findings.append(f'{lineno}: {line}')

          if findings:
              print('::error::Potential hardcoded secret found in added lines')
              print('\n'.join(findings))
              sys.exit(1)

          print('No obvious hardcoded secrets found in added lines')
          PY
